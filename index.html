<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nike Clone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        /* Navbar */
        .navbar {
            background: #fff;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 24px;
        }

        /* Hero Section */
        .hero {
            background: url('https://images.unsplash.com/photo-1528701800489-20be0e5a3e59') center/cover no-repeat;
            height: 80vh;
            display: flex;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 60px;
            font-weight: bold;
        }

        .hero p {
            font-size: 20px;
        }

        .btn-dark {
            padding: 10px 25px;
        }

        /* Categories */
        .category img {
            width: 100%;
            border-radius: 10px;
        }

        .category h5 {
            margin-top: 10px;
            text-align: center;
        }

        /* Product cards */
        .card img {
            height: 250px;
            object-fit: cover;
        }

        /* Footer */
        footer {
            background: #111;
            color: #fff;
            padding: 30px 0;
        }

        footer a {
            color: #bbb;
            text-decoration: none;
        }

        footer a:hover {
            color: #fff;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="#">NIKE</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            ☰
        </button>

        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link" href="#">Men</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Women</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Kids</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Sports</a></li>
            </ul>

            <input class="form-control w-25" placeholder="Search">
        </div>
    </div>
</nav>

<!-- Hero Section -->
<section class="hero">
    <div class="container">
        <h1>JUST DO IT</h1>
        <p>New arrivals are here. Grab yours now.</p>
        <button class="btn btn-dark">Shop Now</button>
    </div>
</section>

<!-- Categories -->
<section class="container my-5">
    <h3 class="text-center mb-4">Shop by Category</h3>
    <div class="row">
        <div class="col-md-4 category">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
            <h5>Shoes</h5>
        </div>
        <div class="col-md-4 category">
            <img src="https://images.unsplash.com/photo-1521335629791-ce4aec67dd47">
            <h5>Clothing</h5>
        </div>
        <div class="col-md-4 category">
            <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
            <h5>Accessories</h5>
        </div>
    </div>
</section>

<!-- Featured Products -->
<section class="container my-5">
    <h3 class="text-center mb-4">Featured Products</h3>
    <div class="row">

        <div class="col-md-4">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1513105737059-ff0cf0580f7b">
                <div class="card-body text-center">
                    <h5>Running Shoes</h5>
                    <p>₹7999</p>
                    <button class="btn btn-dark">Buy Now</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1520975922284-8b456906c813">
                <div class="card-body text-center">
                    <h5>Sports Jacket</h5>
                    <p>₹4999</p>
                    <button class="btn btn-dark">Buy Now</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1593032465171-8d78b3e5c69e">
                <div class="card-body text-center">
                    <h5>Gym Bag</h5>
                    <p>₹2999</p>
                    <button class="btn btn-dark">Buy Now</button>
                </div>
            </div>
        </div>

    </div>
</section>

<!-- Footer -->
<footer>
    <div class="container text-center">
        <p>© 2026 Nike Clone. All rights reserved.</p>
        <p>
            <a href="#">Privacy</a> |
            <a href="#">Terms</a> |
            <a href="#">Contact</a>
        </p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
